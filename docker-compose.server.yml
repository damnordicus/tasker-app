# Place this file on your server along with a .env file (see bottom of this file for required vars).
# Build & start:  docker compose -f docker-compose.server.yml up -d --build
# Update to latest: docker compose -f docker-compose.server.yml up -d --build --pull always

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tasker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-tasker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tasker} -d ${POSTGRES_DB:-tasker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: https://github.com/YOUR_USERNAME/tasker-app.git
      dockerfile_inline: |
        FROM node:22-alpine
        WORKDIR /app
        COPY . .
        RUN yarn install
        RUN DATABASE_URL=postgresql://x:x@localhost/x yarn build
        EXPOSE 3000
        CMD ["sh", "-c", "yarn drizzle-kit push --force && node build/index.js"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tasker}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tasker}
      PORT: 3000
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASS: ${IMAP_PASS:-}
      IMAP_TARGET_ADDRESS: ${IMAP_TARGET_ADDRESS:-}
      IMAP_PROCESSED_FOLDER: ${IMAP_PROCESSED_FOLDER:-Processed}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

# ── .env file to create alongside this compose file ──────────────────────────
#
# POSTGRES_PASSWORD=changeme          # required
# POSTGRES_USER=tasker                # optional, default: tasker
# POSTGRES_DB=tasker                  # optional, default: tasker
#
# IMAP_HOST=mail.yourdomain.com       # optional – only needed for email import
# IMAP_PORT=993
# IMAP_USER=you@yourdomain.com
# IMAP_PASS=your-password
# IMAP_TARGET_ADDRESS=you+tasks@yourdomain.com
# IMAP_PROCESSED_FOLDER=Processed
